name: Release Linux

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.3)'
        required: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake build-essential libgl1-mesa-dev \
            libwayland-dev libx11-dev libxkbcommon-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libasound2-dev libpulse-dev libdbus-1-dev \
            libfreetype-dev libharfbuzz-dev \
            patchelf

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Package
        run: |
          mkdir -p dist/pong-linux-x86_64
          cp build/Pong dist/pong-linux-x86_64/
          cp -r assets dist/pong-linux-x86_64/
          ldd build/Pong | awk '/libSDL/{print $3}' | xargs -I{} cp -L {} dist/pong-linux-x86_64/
          patchelf --set-rpath '$ORIGIN' dist/pong-linux-x86_64/Pong
          tar -czf pong-linux-x86_64.tar.gz -C dist pong-linux-x86_64

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: pong-linux-x86_64.tar.gz
        permissions:
          contents: write

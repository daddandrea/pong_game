name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake build-essential libgl1-mesa-dev \
            libwayland-dev libx11-dev libxkbcommon-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libasound2-dev libpulse-dev libdbus-1-dev

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DSDL_SHARED=OFF \
            -DSDL_STATIC=ON \
            -DSDL3TTF_SHARED=OFF \
            -DSDL3TTF_STATIC=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Package
        run: |
          mkdir -p dist/pong-linux-x86_64
          cp build/Pong dist/pong-linux-x86_64/
          cp -r assets dist/pong-linux-x86_64/
          tar -czf pong-linux-x86_64.tar.gz -C dist pong-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: pong-linux-x86_64
          path: pong-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist\pong-windows-x86_64
          Copy-Item build\Release\Pong.exe dist\pong-windows-x86_64\
          Copy-Item -Recurse assets dist\pong-windows-x86_64\assets
          Get-ChildItem build\Release\*.dll | Copy-Item -Destination dist\pong-windows-x86_64\
          Compress-Archive -Path dist\pong-windows-x86_64 -DestinationPath pong-windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: pong-windows-x86_64
          path: pong-windows-x86_64.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            pong-linux-x86_64/pong-linux-x86_64.tar.gz
            pong-windows-x86_64/pong-windows-x86_64.zip
